name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Run typecheck
        run: |
          set -o pipefail
          bun run typecheck 2>&1 | tee typecheck-output.txt
      - name: Run Bun tests
        run: |
          set -o pipefail
          bun test 2>&1 | tee test-output.txt
      - name: Run Convex tests
        run: |
          set -o pipefail
          bun run test:convex 2>&1 | tee convex-test-output.txt
      - name: Upload failing diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: |
            typecheck-output.txt
            test-output.txt
            convex-test-output.txt
          if-no-files-found: ignore
